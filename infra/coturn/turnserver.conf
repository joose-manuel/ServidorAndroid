# =============================================================================
# coturn TURN/STUN server config
# Used by WebRTC sessions for camera + intercom (HU-10..14)
# Short-lived credentials are issued by the NestJS API (HU-18 / doc 11.4)
# Run: docker run -d --name coturn -p 3478:3478 -p 5349:5349 -p 49152-65535:49152-65535/udp \
#        -v $PWD/infra/coturn/turnserver.conf:/etc/coturn/turnserver.conf \
#        coturn/coturn
# =============================================================================

# Listening ports
listening-port=3478
tls-listening-port=5349
min-port=49152
max-port=65535

# Realm & domain (must match TURN_SERVER_DOMAIN env in NestJS)
realm=turn.example.com
server-name=turn.example.com

# Use short-lived credentials (recommended in doc 11.4)
use-auth-secret
static-auth-secret=__REPLACE_WITH_TURN_SHARED_SECRET__

# TLS (provide certs via volumes in production)
cert=/etc/coturn/certs/fullchain.pem
pkey=/etc/coturn/certs/privkey.pem
no-tlsv1
no-tlsv1_1
cipher-list="ECDHE+AESGCM:ECDHE+CHACHA20:DHE+AESGCM:DHE+CHACHA20"

# STUN-only mode for unauthenticated probes
fingerprint

# Network
no-multicast-peers
no-loopback-peers
no-cli

# Logging
log-file=stdout
simple-log
new-log-timestamp
verbose

# Operational
total-quota=100
bps-capacity=0
stale-nonce=600
max-allocate-timeout=600
realm=all
syslog