# Fly.io config — apps/api (NestJS 10)
# Docs: https://fly.io/docs/reference/configuration/

app = "servidorandroid-api"
primary_region = "mia"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "infra/docker/api.Dockerfile"
  target     = "production"

[env]
  NODE_ENV        = "production"
  API_PORT        = "3000"
  API_HOST        = "0.0.0.0"
  API_GLOBAL_PREFIX = "api"
  METRICS_PING_INTERVAL_MS     = "180000"
  NETWORK_SCAN_INTERVAL_MS     = "900000"
  METRICS_LATENCY_ALERT_MS     = "300"
  TURN_CREDENTIAL_TTL_SECONDS  = "3600"

[experimental]
  auto_rollback = true

[[services]]
  protocol      = "tcp"
  internal_port = 3000
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port       = 80
    handlers   = ["http"]
    force_https = true

  [[services.ports]]
    port     = 443
    handlers = ["tls", "http"]

  [[services.tcp_checks]]
    interval     = "15s"
    timeout      = "2s"
    grace_period = "10s"

  [[services.http_checks]]
    interval     = "30s"
    timeout      = "5s"
    grace_period = "20s"
    method       = "GET"
    path         = "/api/health"

  [services.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  size      = "shared-cpu-1x"
  memory    = "512mb"
  cpu_kind  = "shared"
  cpus      = 1

[deploy]
  release_command = "npx nx run api:migration:run --configuration=production"
  strategy        = "rolling"