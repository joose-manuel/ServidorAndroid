name: CD Edge (Android APK)

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      track:
        description: 'Release track (internal|alpha|beta|production)'
        required: true
        default: 'internal'

concurrency:
  group: cd-edge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-apk:
    name: Build signed APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/edge/android/**/*.gradle*', 'apps/edge/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Restore Nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-cache-edge-${{ runner.os }}-${{ hashFiles('nx.json', 'package-lock.json', 'tsconfig.base.json') }}
          restore-keys: |
            nx-cache-edge-${{ runner.os }}-

      - name: Build Angular (assets consumed by Capacitor)
        run: npx nx build web --configuration=production --skip-nx-cache=false

      - name: Sync Capacitor with Android
        run: npx nx run edge:cap:sync

      - name: Decode release keystore
        run: |
          mkdir -p apps/edge/android/app
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > apps/edge/android/app/release.keystore
          ls -la apps/edge/android/app/release.keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Configure Gradle signing
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true

      - name: Build release APK
        working-directory: apps/edge/android
        run: ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=release.keystore \
              -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
              -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
              -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}
        env:
          GRADLE_OPTS: -Xmx2g -Dfile.encoding=UTF-8

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: servidorandroid-edge-apk
          path: apps/edge/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            apps/edge/android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}