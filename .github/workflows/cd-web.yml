name: CD Web (Netlify)

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: cd-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy to Netlify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
      url: ${{ steps.deploy.outputs.deploy-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Restore Nx cache
        uses: actions/cache@v6
        with:
          path: .nx/cache
          key: nx-cache-web-${{ runner.os }}-${{ hashFiles('nx.json', 'package-lock.json', 'tsconfig.base.json') }}
          restore-keys: |
            nx-cache-web-${{ runner.os }}-

      - name: Build Angular app
        run: npx nx build web --configuration=production

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: dist/apps/web
          retention-days: 7

      - name: Deploy to Netlify
        id: deploy
        uses: nwtgck/actions-netlify@v4.0
        with:
          publish-dir: dist/apps/web/browser
          production-branch: main
          staging-branch: develop
          deploy-message: "Deploy from ${{ github.sha }} via ${{ github.workflow }}"
          enable-commit-comment: true
          overwrites-pull-request-comment: true
          env:
            NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
            NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Summary
        if: always()
        run: |
          echo "### Netlify deploy" >> $GITHUB_STEP_SUMMARY
          echo "- URL: ${{ steps.deploy.outputs.deploy-url }}" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}" >> $GITHUB_STEP_SUMMARY
          echo "- SHA: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY